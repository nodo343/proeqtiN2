<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - Step Ordering</title>
    <link rel="stylesheet" href="../common/common.css">
    <link rel="stylesheet" href="cart.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div id="notification-container"></div>
    <header>
        <div class="container nav-container">
            <a href="../index.html" class="logo">
                <span class="step">Step</span>
                <span class="ordering">Ordering</span>
            </a>

            <div class="mobile-toggle" id="mobile-toggle">
                <i class="fas fa-bars"></i>
            </div>

            <nav id="main-nav">
                <a href="../index.html">Home</a>
                <a href="index.html" class="cart-btn">
                    <span>Cart</span>
                    <div class="cart-icon-container">
                        <i class="fas fa-motorcycle"></i>
                    </div>
                </a>
                <div class="auth-links-group">
                    <a href="../signin/index.html" class="nav-link-auth">Sign In</a>
                    <a href="../signup/index.html" class="nav-link-auth">Sign Up</a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero cart-hero"
            style="background-image: url('https://images.unsplash.com/photo-1543353071-873f17a7a088?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-position: center; position: relative; display: flex; align-items: center; justify-content: center; text-align: center;">
            <div class="hero-overlay"
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5);">
            </div>
            <div class="container hero-content" style="position: relative; z-index: 1;">
                <h1 style="color: white; font-size: 42px;">My Cart</h1>
            </div>
        </section>

        <section class="breadcrumbs">
            <div class="container">
                <p><a href="../index.html">Home</a> / <span class="active">Cart</span></p>
            </div>
        </section>

        <section class="cart-content container">
            <h2 class="section-title">Cart</h2>
            <div class="cart-table-container">
                <table id="cart-table">
                    <thead>
                        <tr>
                            <th></th>
                            <th>Product</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="cart-items">
                    </tbody>
                </table>
            </div>

            <div class="cart-summary">
                <div class="total-row">
                    <span>Total:</span>
                    <span id="cart-total-price">$ 0</span>
                </div>
                <button id="checkout-btn" class="btn-primary">PROCEED TO CHECKOUT</button>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© Step Ordering 2026, All rights reserved</p>
        </div>
    </footer>

    <script type="module" src="cart.js"></script>
</body>

</html>
