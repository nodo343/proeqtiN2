<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Step Ordering</title>
    <link rel="stylesheet" href="../common/common.css">
    <link rel="stylesheet" href="signin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>

<body>
    <div id="notification-container"></div>
    <header>
        <div class="container nav-container">
            <a href="../index.html" class="logo">
                <span class="step">Step</span>
                <span class="ordering">Ordering</span>
            </a>
            <nav id="main-nav">
                <a href="../index.html">Home</a>
                <a href="../cart/index.html" class="cart-btn">
                    <span>Cart</span>
                    <div class="cart-icon-container">
                        <i class="fas fa-motorcycle"></i>
                    </div>
                </a>
                <div class="auth-links-group">
                    <a href="index.html" class="nav-link-auth active" style="color: var(--primary-color)">Sign In</a>
                    <a href="../signup/index.html" class="nav-link-auth">Sign Up</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Sign In</h2>
            </div>

            <div id="signin-form" class="auth-form">
                <div id="login-credentials">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="login-email" placeholder="example@mail.com">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="login-password" placeholder="••••••••">
                    </div>
                </div>

                <div class="form-group" id="code-group" style="display: none;">
                    <label><i class="fas fa-key"></i> Verification Code</label>
                    <input type="text" id="verification-code" placeholder="Enter 6-digit code">
                </div>

                <button class="btn-full" id="btn-login-main">Get Login Code</button>
                <button class="btn-full" id="btn-verify-code" style="display: none;">Verify & Log In</button>
            </div>

            <div class="auth-footer">
                Don't have an account? <a href="../signup/index.html">Sign Up</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© Step Ordering 2026, All rights reserved</p>
        </div>
    </footer>

    <script type="module" src="signin.js"></script>
</body>

</html>
